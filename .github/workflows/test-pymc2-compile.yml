# Test pymc2 compilation on Python 3.12 + Ubuntu 24.04.
# Validates that the Gitee pymc2 package can compile and run basic MCMC sampling
# on the target platform before committing to the full dockerHDDM 1.1.0 upgrade.
#
# Trigger: manual (workflow_dispatch) or on push to Dockerfile

name: Test pymc2 Compilation

on:
  workflow_dispatch:
    inputs:
      pymc2_ref:
        description: 'Gitee pymc2 branch, tag, or commit to test'
        required: false
        default: 'master'
        type: string
  push:
    branches: [master]
    paths:
      - 'Dockerfile'
      - '.github/workflows/test-pymc2-compile.yml'

jobs:
  test-pymc2:
    runs-on: ubuntu-24.04
    env:
      PYMC2_REPO: https://gitee.com/epool/pymc2
      PYMC2_REF: ${{ github.event.inputs.pymc2_ref || 'master' }}
    strategy:
      matrix:
        python-version: ['3.12']
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential gcc g++ gfortran pkg-config libopenblas-dev liblapack-dev

      - name: Test pymc2 compilation + import
        run: |
          echo "=== Installing pymc2 from ${PYMC2_REPO}@${PYMC2_REF} ==="
          pip install --upgrade pip
          pip install "git+${PYMC2_REPO}@${PYMC2_REF}"
          echo "=== Verifying pymc2 import ==="
          python -c "import pymc; import pymc.flib; import pymc.gp.linalg_utils; print('pymc version:', pymc.__version__)"
          echo "=== SUCCESS: pymc2 compiles on Python ${{ matrix.python-version }} ==="

      - name: Test pymc2 MCMC sampling (PyMC2 API)
        run: |
          python -c "
          import pymc
          import numpy as np
          print('=== Testing pymc2 MCMC sampling ===')
          # PyMC2 API: create stochastic nodes directly (no Model() context manager)
          mu = pymc.Normal('mu', mu=0, tau=1, value=0)
          # MCMC() accepts a list of nodes directly (PyMC2 pattern)
          mcmc = pymc.MCMC([mu])
          # sample(iter, burn, thin) — note: no 'progress_bar' param in PyMC2
          mcmc.sample(iter=500, burn=100, thin=1)
          # Verify trace was stored
          trace = mcmc.trace('mu')[:]
          assert len(trace) == 400, f'Expected 400 samples, got {len(trace)}'
          print(f'pymc2 MCMC test PASSED: {len(trace)} samples, mean={np.mean(trace):.3f}')
          "
