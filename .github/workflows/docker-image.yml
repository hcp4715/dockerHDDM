name: dockerHDDM CI (Build & Publish)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.1.0)'
        required: true
        default: '1.1.0'
        type: string
      publish:
        description: 'Push the multi-arch image to Docker Hub'
        required: true
        default: false
        type: boolean
      base_image:
        description: 'Jupyter base image (use a Docker Hub cache if Quay is unavailable)'
        required: true
        default: 'quay.io/jupyter/scipy-notebook:82d322f00937'
        type: string
  push:
    tags:
      - 'v*'

jobs:

  buildx:
    runs-on: ubuntu-latest
    env:
      HDDM_VERSION: hddm:${{ inputs.version || '1.1.0' }}
      JUPYTER_BASE_IMAGE: ${{ inputs.base_image || 'quay.io/jupyter/scipy-notebook:82d322f00937' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Extract version from tag (if tag push)
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        echo "HDDM_VERSION=hddm:${VERSION}" >> "$GITHUB_ENV"

    - name: Set up QEMU (for arm64 emulation)
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Select the Jupyter base image
      run: |
        for attempt in 1 2 3 4 5; do
          if docker buildx imagetools inspect "${JUPYTER_BASE_IMAGE}" >/dev/null; then
            echo "SELECTED_BASE_IMAGE=${JUPYTER_BASE_IMAGE}" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "Base image registry attempt ${attempt} failed; retrying in 30 seconds..."
          sleep 30
        done
        exit 1

    - name: Build amd64 image for validation
      if: github.event_name == 'workflow_dispatch' && inputs.publish != true
      run: |
        for attempt in 1 2 3; do
          docker buildx build --platform linux/amd64 \
            --build-arg JUPYTER_BASE_IMAGE="${SELECTED_BASE_IMAGE}" \
            -t dockerhddm:test \
            -f Dockerfile . --load && break
          if [ "$attempt" -eq 3 ]; then
            exit 1
          fi
          echo "Docker build attempt ${attempt} failed; retrying in 20 seconds..."
          sleep 20
        done

    - name: Smoke test the validation image
      if: github.event_name == 'workflow_dispatch' && inputs.publish != true
      run: |
        docker run --rm dockerhddm:test \
          python -c "import pymc; import kabuki; import hddm; print('pymc:', pymc.__version__); print('dockerHDDM smoke test passed')"

    - name: Docker login
      if: github.event_name == 'push' || inputs.publish == true
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Build and push multi-arch image
      if: github.event_name == 'push' || inputs.publish == true
      run: |
        for attempt in 1 2 3; do
          docker buildx build --platform linux/amd64,linux/arm64 \
            --build-arg JUPYTER_BASE_IMAGE="${SELECTED_BASE_IMAGE}" \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.HDDM_VERSION }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/hddm:latest \
            -f Dockerfile . --push && break
          if [ "$attempt" -eq 3 ]; then
            exit 1
          fi
          echo "Docker publish attempt ${attempt} failed; retrying in 20 seconds..."
          sleep 20
        done
